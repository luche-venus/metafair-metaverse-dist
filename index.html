<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=yes, viewport-fit=cover">
    <title>METAFAIR</title>

    <!-- MICROPHONE PRO START -->
    <script src='./microphone.js'></script>
    <!-- MICROPHONE PRO END -->

    <!-- Host bridge: parent SPA receives UnityEvent (SetScore / Navigate) -->
    <script>
      (function () {
        function postToParent(eventName, data) {
          var msg = { type: 'UnityEvent', eventName: eventName, data: data };
          try {
            if (window.parent && window.parent !== window) {
              window.parent.postMessage(msg, '*');
            }
          } catch (e) {
            console.warn('[unity-host-bridge] postMessage failed', e);
          }
          if (typeof window.dispatchReactUnityEvent === 'function') {
            try { window.dispatchReactUnityEvent(eventName, data); } catch (_) {}
          }
          console.info('[unity-host-bridge]', eventName, data);
        }
        window.__unityBridge = {
          setScore: function (id) { postToParent('SetScore', Number(id)); },
          navigate: function (path) { postToParent('Navigate', String(path || '')); },
        };
        if (typeof window.SetScore !== 'function') {
          window.SetScore = function (score) { postToParent('SetScore', score); };
        }
        if (typeof window.Navigate !== 'function') {
          window.Navigate = function (path) { postToParent('Navigate', path); };
        }
      })();
    </script>

    <!--
      Touch diagnostics (always light). Enable verbose HUD via:
        - this page: ?touchDebug=1
        - parent SPA: ?unityTouchDebug=1  (listens for UnityTouchProbe postMessage)
      Binary isolation:
        A) open this Dist URL alone on the phone
        B) open host /metafair-art embedding this URL
      If A works and B fails → host overlay/scroll. If both fail → Unity input/scale.
    -->
    <script>
      (function () {
        var params = new URLSearchParams(location.search || '');
        var debug =
          params.get('touchDebug') === '1' ||
          params.get('unityTouchDebug') === '1' ||
          (function () {
            try { return localStorage.getItem('metafair_unity_touch_debug') === '1'; } catch (e) { return false; }
          })();

        window.__unityTouchDebug = debug;
        window.__unityTouchProbe = {
          counts: { touchstart: 0, touchend: 0, pointerdown: 0, pointerup: 0, mousedown: 0, click: 0 },
          last: null,
          canvas: null,
        };

        function report(type, e) {
          var t = (e.touches && e.touches[0]) || (e.changedTouches && e.changedTouches[0]) || e;
          var payload = {
            type: type,
            x: typeof t.clientX === 'number' ? t.clientX : null,
            y: typeof t.clientY === 'number' ? t.clientY : null,
            pointerType: e.pointerType || null,
            target: e.target && (e.target.id || e.target.tagName),
            dpr: window.devicePixelRatio || 1,
            cw: window.__unityTouchProbe.canvas && window.__unityTouchProbe.canvas.clientWidth,
            ch: window.__unityTouchProbe.canvas && window.__unityTouchProbe.canvas.clientHeight,
            bw: window.__unityTouchProbe.canvas && window.__unityTouchProbe.canvas.width,
            bh: window.__unityTouchProbe.canvas && window.__unityTouchProbe.canvas.height,
            embedded: !!(window.parent && window.parent !== window),
            uaMobile: /iPhone|iPad|iPod|Android/i.test(navigator.userAgent),
          };
          window.__unityTouchProbe.counts[type] = (window.__unityTouchProbe.counts[type] || 0) + 1;
          window.__unityTouchProbe.last = payload;
          try {
            if (window.parent && window.parent !== window) {
              window.parent.postMessage({ type: 'UnityTouchProbe', payload: payload, counts: window.__unityTouchProbe.counts }, '*');
            }
          } catch (_) {}
          if (debug) console.info('[unity-touch-probe]', payload);
        }

        window.__installUnityTouchProbe = function (canvas) {
          window.__unityTouchProbe.canvas = canvas;
          ['touchstart', 'touchend', 'pointerdown', 'pointerup', 'mousedown', 'click'].forEach(function (type) {
            canvas.addEventListener(type, function (e) { report(type, e); }, true);
          });
        };
      })();
    </script>

    <style>
      html, body {
        margin: 0;
        padding: 0;
        border: 0;
        background: #FAFAFA;
        width: 100%;
        height: 100%;
        overflow: hidden;
        /* Browser must not steal pan/zoom; Unity UI needs raw taps */
        touch-action: none;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
        position: relative;
      }
      #unity-canvas {
        background: #FAFAFA;
        display: block;
        /* Absolute fill of the iframe/document — NOT position:fixed.
           Fixed + mobile UA was a desktop-vs-mobile layout fork that breaks
           Unity's screen/UI coordinate mapping inside cross-origin iframes. */
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        outline: none;
      }
      #unity-loading {
        position: absolute;
        inset: 0;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: #FAFAFA;
        transition: opacity 0.6s ease;
      }
      #unity-loading.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #unity-loading .spinner {
        position: relative;
        width: 40px;
        height: 40px;
      }
      #unity-loading .spinner span {
        position: absolute;
        inset: 0;
        border-radius: 9999px;
        border: 2px solid #E5E5E5;
      }
      #unity-loading .spinner span:last-child {
        border: 2px solid transparent;
        border-top-color: #3C3C3C;
        animation: unity-spin 0.9s linear infinite;
      }
      @keyframes unity-spin {
        to { transform: rotate(360deg); }
      }
      #unity-loading .label {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 11px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: rgba(60, 60, 60, 0.5);
      }
      #unity-touch-debug-hud {
        position: absolute;
        left: 8px;
        top: 8px;
        z-index: 20;
        max-width: 92%;
        padding: 8px 10px;
        border-radius: 8px;
        background: rgba(0,0,0,0.72);
        color: #f5f5f5;
        font: 11px/1.35 ui-monospace, SFMono-Regular, Menlo, monospace;
        pointer-events: none;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <canvas id="unity-canvas" width="1280" height="720" tabindex="0"></canvas>

    <div id="unity-loading">
      <div class="spinner"><span></span><span></span></div>
      <div class="label">Loading experience</div>
    </div>

    <script src="Build/Dist.loader.js"></script>
    <script>
      (function () {
        var canvas = document.querySelector('#unity-canvas');
        var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        var embedded = !!(window.parent && window.parent !== window);

        if (typeof window.__installUnityTouchProbe === 'function') {
          window.__installUnityTouchProbe(canvas);
        }

        // Keep canvas focused so InputSystem/EventSystem see subsequent gestures.
        var focusCanvas = function () {
          try { canvas.focus({ preventScroll: true }); } catch (e) {
            try { canvas.focus(); } catch (_) {}
          }
        };
        canvas.addEventListener('touchstart', focusCanvas, { passive: true, capture: true });
        canvas.addEventListener('pointerdown', focusCanvas, { passive: true, capture: true });

        // Only cancel touch *move* (pan/scroll). Do NOT preventDefault on touchstart/touchend:
        // browsers suppress compatibility mousedown/click when touchstart is canceled, and Unity
        // StandaloneInputModule / mixed Input System often depends on those for UI clicks.
        canvas.addEventListener(
          'touchmove',
          function (e) {
            if (e.cancelable) e.preventDefault();
          },
          { passive: false, capture: true },
        );

        // Chrome DevTools Sensors "Touch: force enabled" turns clicks into touch-only
        // (often no compatibility mousedown). Unity uGUI with Input Manager / Both mode
        // still needs mouse events — synthesize them from single-finger touch.
        (function bridgeTouchToMouse(el) {
          var tracking = false;
          function fire(type, touch, buttons) {
            var evt = new MouseEvent(type, {
              bubbles: true,
              cancelable: true,
              view: window,
              clientX: touch.clientX,
              clientY: touch.clientY,
              screenX: touch.screenX,
              screenY: touch.screenY,
              button: 0,
              buttons: buttons,
              detail: type === 'click' ? 1 : 0,
            });
            el.dispatchEvent(evt);
          }
          el.addEventListener(
            'touchstart',
            function (e) {
              if (e.touches.length !== 1) return;
              tracking = true;
              fire('mousedown', e.touches[0], 1);
            },
            { passive: true },
          );
          el.addEventListener(
            'touchmove',
            function (e) {
              if (!tracking || !e.touches[0]) return;
              fire('mousemove', e.touches[0], 1);
            },
            { passive: true },
          );
          el.addEventListener(
            'touchend',
            function (e) {
              if (!tracking) return;
              tracking = false;
              var t = e.changedTouches[0];
              if (!t) return;
              fire('mouseup', t, 0);
              fire('click', t, 0);
            },
            { passive: true },
          );
          el.addEventListener(
            'touchcancel',
            function () {
              tracking = false;
            },
            { passive: true },
          );
        })(canvas);

        var loadingOverlay = document.getElementById('unity-loading');
        var hideLoading = function () {
          if (!loadingOverlay) return;
          loadingOverlay.classList.add('hidden');
          loadingOverlay.style.pointerEvents = 'none';
          setTimeout(function () {
            if (loadingOverlay && loadingOverlay.parentNode) loadingOverlay.parentNode.removeChild(loadingOverlay);
            loadingOverlay = null;
          }, 700);
          focusCanvas();
        };

        // High-DPI mobile: default matchWebGLToCanvasSize * devicePixelRatio often desyncs
        // Screen/UI raycasts (display OK, taps miss buttons). Force DPR=1 on touch devices.
        var config = {
          dataUrl: 'Build/Dist.data.unityweb',
          frameworkUrl: 'Build/Dist.framework.js.unityweb',
          codeUrl: 'Build/Dist.wasm.unityweb',
          streamingAssetsUrl: 'StreamingAssets',
          companyName: 'DefaultCompany',
          productName: 'jj_demo',
          productVersion: '0.1.0',
          matchWebGLToCanvasSize: true,
        };
        if (isMobile || (navigator.maxTouchPoints && navigator.maxTouchPoints > 0 && window.innerWidth < 900)) {
          config.devicePixelRatio = 1;
        }

        if (window.__unityTouchDebug) {
          var hud = document.createElement('div');
          hud.id = 'unity-touch-debug-hud';
          hud.textContent = 'touchDebug on\nembedded=' + embedded + ' mobile=' + isMobile + '\ndpr(cfg)=' + (config.devicePixelRatio || 'auto');
          document.body.appendChild(hud);
          window.addEventListener('message', function () {});
          setInterval(function () {
            var p = window.__unityTouchProbe;
            if (!p || !hud) return;
            var last = p.last;
            hud.textContent =
              'touchDebug (Dist)\n' +
              'embedded=' + embedded + ' mobileUA=' + isMobile + '\n' +
              'css=' + canvas.clientWidth + 'x' + canvas.clientHeight +
              ' buf=' + canvas.width + 'x' + canvas.height +
              ' dpr=' + (window.devicePixelRatio || 1) + '\n' +
              'counts ' + JSON.stringify(p.counts) + '\n' +
              (last ? ('last ' + last.type + ' @' + last.x + ',' + last.y + ' ' + (last.pointerType || '')) : 'last: (tap canvas)');
          }, 200);
        }

        createUnityInstance(canvas, config)
          .then(function (instance) {
            window.__unityInstance = instance;
            hideLoading();
            // Re-assert layout after boot (some loaders rewrite canvas style).
            canvas.style.position = 'absolute';
            canvas.style.left = '0';
            canvas.style.top = '0';
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            canvas.style.touchAction = 'none';
            // Nudge engine to resync buffer to CSS box (mobile buffer stuck at 1280x720
            // while CSS is ~390x664 → display stretches but UI raycasts miss).
            try {
              window.dispatchEvent(new Event('resize'));
              if (instance.Module && typeof instance.Module.setCanvasSize === 'function') {
                instance.Module.setCanvasSize(canvas.clientWidth, canvas.clientHeight, true);
              }
            } catch (_) {}
            focusCanvas();
          })
          .catch(function (err) {
            console.error('[unity] createUnityInstance failed', err);
            hideLoading();
          });
      })();
    </script>
  </body>
</html>
